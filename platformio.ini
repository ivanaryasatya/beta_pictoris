; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM6
lib_deps = 
	mobizt/Firebase Arduino Client Library for ESP8266 and ESP32@^4.4.17
	adafruit/Adafruit MPU6050@^2.2.9
	arduino-libraries/Servo@^1.3.0
	t-vk/ESP32 BLE Keyboard@^0.3.2
	https://github.com/jvpernis/esp32-ps3.git
build_src_filter = +<esp32/> -<nano/> -<reference/>
lib_extra_dirs = F:\Arduino\libraries

[env:nanoatmega168]
platform = atmelavr
board = nanoatmega168
framework = arduino
monitor_speed = 115200
build_src_filter = +<nano/> -<esp32/> -<reference/>
upload_port = COM5
lib_extra_dirs = F:\Arduino\libraries
